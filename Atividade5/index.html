<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <title>Formulário</title>
    
    <style>

        /*CSS*/

    h1{
        text-align: center;
        font-family: 'Oswald', sans-serif;
    }
    #botao:hover{
        background-color: #001c68;
        color: white;
        border: none;
        cursor: pointer;
    }
    body{
        padding: 30px;
        margin: 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    form{
        display: grid;
        grid-template-columns: 1fr;
        align-items: center;
    }

    #formulario{
        display: flex;
        align-items: center;
        margin-bottom: 15px;
    }

    input:focus{
        border: 2px solid #001c68;
        outline: none;
    }

    label{
        width: 160px;
    }

    input{
        padding: 5px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }

    </style>
    <!--HTML-->
    </head>
    <body>
        <h1>Formulário de Cadastro</h1>
        <div id="formulario">
            <form>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required><br><br>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required><br><br>
                
                <label for="data"> Data de nascimento:</label>
                <input type="date" id="data" name="data" required><br><br>

                <label for="curso">Curso:</label>
                <input type="text" id="curso" name="curso" required><br><br>
                
                <label for="sexo"> Gênero:</label>
                <input type="text" id="sexo" name="sexo" required><br><br>
                
                <label for="interesses">Interesses:</label>
                <input type="text" id="interesses" name="interesses" required><br><br>
                
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required><br><br>
                <button type="submit" id="botao">Enviar</button>
            </div>
        </form>    
    </body>
    </html>
